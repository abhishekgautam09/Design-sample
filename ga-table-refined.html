<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Google Analytics – Reports</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #eef0f3;
  display: flex;
  justify-content: center;
  padding: 36px 16px;
  min-height: 100vh;
}

/* ── Card ── */
.card {
  width: 1085px;
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 20px rgba(0,0,0,.07);
}

/* ── Header ── */
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 28px 18px;
}
.card-title {
  font-size: 17px;
  font-weight: 700;
  color: #111827;
  letter-spacing: -.25px;
}

/* Search */
.search-wrap {
  display: flex;
  align-items: center;
  border: 1.5px solid #e5e7eb;
  border-radius: 9px;
  overflow: hidden;
  width: 288px;
  transition: border-color .18s;
}
.search-wrap:focus-within { border-color: #6c47ff; }
.search-wrap input {
  flex: 1;
  border: none;
  outline: none;
  padding: 8px 12px;
  font-size: 13px;
  font-family: inherit;
  color: #374151;
  background: transparent;
}
.search-wrap input::placeholder { color: #c0c7d0; }
.search-btn {
  background: #f3f4f6;
  border: none;
  border-left: 1.5px solid #e5e7eb;
  padding: 8px 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.search-btn:hover { background: #e9ebee; }

/* ── Table ── */
.table-wrap {
  overflow-x: auto;
  border-top: 1px solid #f3f4f6;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1060px;
}

/* Header row */
thead tr {
  background: #fafafa;
  border-bottom: 1px solid #f0f0f0;
}

thead th {
  padding: 11px 16px;
  text-align: left;
  font-size: 10.5px;
  font-weight: 700;
  color: #b0b7c3;
  text-transform: uppercase;
  letter-spacing: .65px;
  white-space: nowrap;
  user-select: none;
  cursor: pointer;
  transition: color .15s;
}
thead th:hover { color: #6b7280; }
thead th.sorted { color: #6c47ff; }
thead th:first-child { padding-left: 28px; }
thead th:last-child  { padding-right: 28px; }

/* Sort icon */
.th-inner {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.sort-icon {
  display: inline-flex;
  flex-direction: column;
  gap: 1px;
  opacity: .35;
  transition: opacity .15s;
}
th.sorted .sort-icon { opacity: 1; }
.sort-icon span {
  display: block;
  width: 0;
  height: 0;
}
.sort-icon .up {
  border-left: 3px solid transparent;
  border-right: 3px solid transparent;
  border-bottom: 4px solid currentColor;
}
.sort-icon .dn {
  border-left: 3px solid transparent;
  border-right: 3px solid transparent;
  border-top: 4px solid currentColor;
}
th.sorted.asc  .sort-icon .up { opacity: 1; }
th.sorted.asc  .sort-icon .dn { opacity: .25; }
th.sorted.desc .sort-icon .dn { opacity: 1; }
th.sorted.desc .sort-icon .up { opacity: .25; }

/* Sticky brand column */
thead th:first-child,
tbody td:first-child {
  position: sticky;
  left: 0;
  background: #fafafa;
  z-index: 2;
}
tbody td:first-child { background: #fff; }
tbody tr:hover td:first-child { background: #f9f9ff; }
thead th:first-child { z-index: 3; }

/* Divider shadow on sticky col */
thead th:first-child::after,
tbody td:first-child::after {
  content: '';
  position: absolute;
  top: 0; right: -8px;
  width: 8px; height: 100%;
  background: linear-gradient(to right, rgba(0,0,0,.04), transparent);
  pointer-events: none;
}

/* Body rows */
tbody tr {
  border-bottom: 1px solid #f5f5f7;
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f9f9ff; }

td {
  padding: 15px 16px;
  font-size: 13.5px;
  color: #4b5563;
  vertical-align: middle;
  white-space: nowrap;
}
td:first-child { padding-left: 28px; }
td:last-child  { padding-right: 28px; }

/* Brand cell */
.brand-cell {
  font-weight: 600;
  color: #111827;
  font-size: 13.5px;
  min-width: 155px;
}

/* Numeric cells */
.num-cell {
  font-variant-numeric: tabular-nums;
  font-size: 13.5px;
  color: #374151;
}

/* Bounce rate */
.bounce { font-variant-numeric: tabular-nums; font-weight: 500; }
.b-high { color: #dc2626; }
.b-mid  { color: #ea580c; }
.b-low  { color: #16a34a; }

/* Engagement — plain text with color signal */
.eng-cell { font-variant-numeric: tabular-nums; font-weight: 600; font-size: 13.5px; }
.eng-high { color: #16a34a; }
.eng-mid  { color: #6c47ff; }
.eng-low  { color: #ea580c; }
.eng-poor { color: #dc2626; }

/* Traffic geo — clean plain text */
.geo-cell {
  font-size: 13px;
  color: #6b7280;
  font-weight: 400;
}

/* Source pills */
.pills { display: flex; gap: 4px; align-items: center; flex-wrap: nowrap; }
.pill {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
  letter-spacing: .1px;
}
.pill.referral { background: #ede9fe; color: #5b21b6; }
.pill.organic  { background: #dcfce7; color: #15803d; }
.pill.direct   { background: #dbeafe; color: #1d4ed8; }
.pill.social   { background: #fce7f3; color: #be185d; }

/* ── Pagination ── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  border-top: 1px solid #f3f4f6;
}
.page-info {
  font-size: 13px;
  color: #b0b7c3;
}
.page-info strong { color: #374151; font-weight: 600; }
.page-btns { display: flex; align-items: center; gap: 3px; }
.page-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: none;
  background: transparent;
  font-size: 13px;
  font-family: inherit;
  color: #6b7280;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: 500;
  transition: background .12s, color .12s;
}
.page-btn:hover { background: #f3f4f6; color: #111827; }
.page-btn.active { background: #6c47ff; color: #fff; font-weight: 700; }
.page-btn.arrow { color: #c0c7d0; font-size: 15px; }
.page-btn.arrow:hover { background: #f3f4f6; color: #374151; }
</style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="card-header">
    <h2 class="card-title">Google Analytics</h2>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Name, Email ID, Brand, Roles..." oninput="filterTable()"/>
      <button class="search-btn" onclick="filterTable()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr id="thead-row">
          <th onclick="sortTable('brand')"      id="th-brand">      <div class="th-inner">Brand Name    <span class="sort-icon"><span class="up"></span><span class="dn"></span></span></div></th>
          <th onclick="sortTable('views')"      id="th-views">      <div class="th-inner">Views         <span class="sort-icon"><span class="up"></span><span class="dn"></span></span></div></th>
          <th onclick="sortTable('activeUsers')"id="th-activeUsers"><div class="th-inner">Active Users  <span class="sort-icon"><span class="up"></span><span class="dn"></span></span></div></th>
          <th onclick="sortTable('newUsers')"   id="th-newUsers">   <div class="th-inner">New Users     <span class="sort-icon"><span class="up"></span><span class="dn"></span></span></div></th>
          <th onclick="sortTable('bounce')"     id="th-bounce">     <div class="th-inner">Bounce Rate   <span class="sort-icon"><span class="up"></span><span class="dn"></span></span></div></th>
          <th onclick="sortTable('traffic')"    id="th-traffic">    <div class="th-inner">Traffic       <span class="sort-icon"><span class="up"></span><span class="dn"></span></span></div></th>
          <th onclick="sortTable('pageviews')"  id="th-pageviews">  <div class="th-inner">Page Views    <span class="sort-icon"><span class="up"></span><span class="dn"></span></span></div></th>
          <th id="th-source">                                        <div class="th-inner">Traffic Source</div></th>
          <th id="th-geo">                                           <div class="th-inner">Traffic Geo</div></th>
          <th onclick="sortTable('engagement')" id="th-engagement"> <div class="th-inner">Avg Engagement<span class="sort-icon"><span class="up"></span><span class="dn"></span></span></div></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination">
    <div class="page-info">Showing <strong id="showCount">1 to 8</strong> of <strong>62 entries</strong></div>
    <div class="page-btns">
      <button class="page-btn arrow">‹</button>
      <button class="page-btn">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn active">3</button>
      <button class="page-btn">4</button>
      <button class="page-btn">5</button>
      <button class="page-btn arrow">›</button>
    </div>
  </div>

</div>

<script>
const data = [
  { brand:'TechVersions',           views:600,    activeUsers:300,   newUsers:179, bounce:66.0, traffic:8200,  pageviews:34100, sources:['organic','social'],           geo:'US, IN',         engagement:72 },
  { brand:'BizVersions',            views:191,    activeUsers:25,    newUsers:118, bounce:53.0, traffic:2800,  pageviews:9300,  sources:['referral','direct'],          geo:'UK, AU',         engagement:48 },
  { brand:'The HR Empire',          views:135,    activeUsers:118,   newUsers:25,  bounce:37.0, traffic:5000,  pageviews:18200, sources:['organic','direct'],           geo:'US, CA',         engagement:61 },
  { brand:'Business Updates 360',   views:17,     activeUsers:10,    newUsers:140, bounce:100,  traffic:540,   pageviews:1900,  sources:['social'],                     geo:'IN, AE',         engagement:22 },
  { brand:'GlobalSupplychain News', views:19000,  activeUsers:15000, newUsers:244, bounce:27.0, traffic:22800, pageviews:88400, sources:['organic','referral','direct'], geo:'US, DE, SG',     engagement:85 },
  { brand:'Pro-Tech Insights',      views:14000,  activeUsers:535,   newUsers:59,  bounce:46.0, traffic:13100, pageviews:47600, sources:['social','organic'],           geo:'US, UK',         engagement:67 },
  { brand:'StartupRadar',           views:11200,  activeUsers:820,   newUsers:310, bounce:38.5, traffic:5400,  pageviews:22100, sources:['referral','social'],          geo:'IN, US',         engagement:55 },
  { brand:'FinanceDesk',            views:9400,   activeUsers:1200,  newUsers:490, bounce:42.0, traffic:7100,  pageviews:28300, sources:['direct','organic'],           geo:'UK, AU, CA',     engagement:79 },
];

let sortCol = null;
let sortDir = 1; // 1 = asc, -1 = desc

function fmtNum(n) {
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'K';
  return String(n);
}

function bounceClass(v) {
  if (v >= 70) return 'b-high';
  if (v >= 44) return 'b-mid';
  return 'b-low';
}

function engClass(v) {
  if (v >= 75) return 'eng-high';
  if (v >= 50) return 'eng-mid';
  if (v >= 30) return 'eng-low';
  return 'eng-poor';
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function render(rows) {
  const body = document.getElementById('tableBody');
  body.innerHTML = '';

  rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="brand-cell">${r.brand}</td>
      <td class="num-cell">${fmtNum(r.views)}</td>
      <td class="num-cell">${fmtNum(r.activeUsers)}</td>
      <td class="num-cell">${fmtNum(r.newUsers)}</td>
      <td class="bounce ${bounceClass(r.bounce)}">${r.bounce === 100 ? '100%' : r.bounce.toFixed(1) + '%'}</td>
      <td class="num-cell">${fmtNum(r.traffic)}</td>
      <td class="num-cell">${fmtNum(r.pageviews)}</td>
      <td><div class="pills">${r.sources.map(s => `<span class="pill ${s}">${cap(s)}</span>`).join('')}</div></td>
      <td class="geo-cell">${r.geo}</td>
      <td class="eng-cell ${engClass(r.engagement)}">${r.engagement}%</td>
    `;
    body.appendChild(tr);
  });

  document.getElementById('showCount').textContent = `1 to ${rows.length}`;
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  render(q ? data.filter(r => r.brand.toLowerCase().includes(q)) : data);
}

function sortTable(col) {
  // Toggle direction
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }

  // Reset all headers
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted', 'asc', 'desc');
  });

  // Mark active header
  const th = document.getElementById('th-' + col);
  if (th) {
    th.classList.add('sorted', sortDir === -1 ? 'desc' : 'asc');
  }

  const sorted = [...data].sort((a, b) => {
    let av = a[col], bv = b[col];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return -1 * sortDir;
    if (av > bv) return  1 * sortDir;
    return 0;
  });

  render(sorted);
}

render(data);
</script>
</body>
</html>
